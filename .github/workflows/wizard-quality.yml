name: Wizard Quality

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  docs-and-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md

      - name: Run docs consistency checks
        shell: pwsh
        run: ./scripts/ci/test-docs-consistency.ps1

      - name: Run script order checks
        shell: pwsh
        run: ./scripts/ci/test-script-order.ps1
